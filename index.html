<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Warna Tema untuk Status Bar HP -->
    <meta name="theme-color" content="#0A0A0E" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <meta name="description" content="Daily Grind Log — Track your training journey" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    
    <!-- CSS Custom Scrollbar & Dark Theme -->
    <style>
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: #000000;
      }
      ::-webkit-scrollbar-thumb {
        background: #7C5CFF;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a28eff;
      }
      html, body {
        background-color: #000000;
        margin: 0;
        padding: 0;
        scrollbar-color: #7C5CFF #000000;
        scrollbar-width: thin;
      }
    </style>
    
    <title>Daily Grind Log</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
